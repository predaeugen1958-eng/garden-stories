        <h1>关于</h1>
        <div class="sub">一个让故事静静安歇的地方</div>

        <div class="about-text">
            <p>这座花园生长得很慢。</p>

            <p>每一篇故事都是一颗种子 — 用心种下，用耐心浇灌，在属于自己的时间里慢慢长大。</p>

            <p>它们是为了正在学习倾听的小朋友而写，也是为了那些还记得如何倾听的大人。</p>

            <p>这里没有催促。没有需要学会的道理，只有需要分享的安静时刻。</p>

            <p>所以，进来吧，坐下来，想待多久就待多久。</p>

            <p>故事会在这里，等你回来。</p>

            <div class="signature">— 来自花园，带着爱</div>
        </div>

        <div class="footer">
            🌱 <span>一个让故事静静安歇的地方</span>
        </div>
    </div>
