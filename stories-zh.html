<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>故事 — 安静故事园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', 'KaiTi', serif;
            background: #faf0d7;
            color: #3b2e26;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 720px;
            background: #fefaf0;
            padding: 2.5rem 2rem;
            border-radius: 48px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.04);
            border: 1px solid #f0e4d8;
            text-align: center;
        }
        .lang-switch {
            text-align: right;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .lang-switch a {
            color: #8a7564;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .lang-switch a:hover {
            border-color: #b5a08c;
        }
        .back {
            display: inline-block;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #8a7564;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .back:hover {
            border-color: #b5a08c;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #3f2e22;
            margin-bottom: 0.3rem;
        }
        .sub {
            font-size: 1rem;
            color: #8a7564;
            letter-spacing: 1px;
            margin-bottom: 2rem;
            font-style: italic;
        }
        .story-list {
            list-style: none;
            padding: 0;
            text-align: left;
            margin: 0 auto;
            max-width: 500px;
        }
        .story-list li {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #f0e4d8;
            padding-bottom: 1.2rem;
        }
        .story-list a {
            text-decoration: none;
            color: #4d3b2e;
            font-size: 1.2rem;
            font-weight: 400;
            display: block;
            transition: color 0.2s;
        }
        .story-list a:hover {
            color: #8a6f5a;
        }
        .story-list .desc {
            font-size: 0.95rem;
            color: #8a7564;
            margin-top: 0.3rem;
            line-height: 1.5;
        }
        .footer {
            font-size: 0.85rem;
            color: #b5a08c;
            border-top: 1px solid #ece0d4;
            padding-top: 1.8rem;
            margin-top: 2.2rem;
            letter-spacing: 0.5px;
        }
        .footer span {
            display: block;
            margin-top: 0.3rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <a href="stories.html">English</a>
        </div>

        <a href="index-zh.html" class="back">← 回到花园</a>

        <h1>故事</h1>
        <div class="sub">等待被阅读的小种子</div>

        <ul class="story-list">
            <li>
                <a href="the-little-seed-zh.html">不知道自己是一棵树的小种子</a>
                <div class="desc">一颗小小的种子，慢慢长成了它从未期待的样子 — 并发现它本就是为此而生。</div>
            </li>
            <li>
                <a href="#">想要留下来的云</a>
                <div class="desc">一朵温柔的云学会了，爱可以化作雨水，而没有什么真正遥远。</div>
            </li>
            <li>
                <a href="#">打盹的叶子</a>
                <div class="desc">一片疲惫的叶子落到地上，找到了休息 — 并学会了休息不是终结。</div>
            </li>
            <li>
                <a href="#">月亮拜访花园</a>
                <div class="desc">月亮洒下一束光来探望花朵，而花朵们将秘密轻轻说给它听。</div>
            </li>
            <li>
                <a href="#">想滚动的小石头</a>
                <div class="desc">一颗圆圆的石头渴望移动 — 并学会了，即使不动，也有自己的旅程。</div>
            </li>
        </ul>

        <div class="footer">
            🌱 <span>更多故事正在慢慢生长</span>
        </div>
    </div>
</body>
</html>
