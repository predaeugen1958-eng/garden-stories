<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Garden of Quiet Stories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background: #faf0d7;
            color: #3b2e26;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 720px;
            background: #fefaf0;
            padding: 2.5rem 2rem;
            border-radius: 48px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.04);
            border: 1px solid #f0e4d8;
            text-align: center;
            position: relative;
        }
        .lang-switch {
            text-align: right;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .lang-switch a {
            color: #8a7564;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .lang-switch a:hover {
            border-color: #b5a08c;
        }
        .icon {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #3f2e22;
            margin-bottom: 0.3rem;
        }
        .sub {
            font-size: 1rem;
            color: #8a7564;
            letter-spacing: 1px;
            margin-bottom: 1.8rem;
            font-style: italic;
        }
        .welcome {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #4d3b2e;
            margin-bottom: 2.2rem;
            padding: 0 0.5rem;
        }
        .nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem 2rem;
            margin: 1.8rem 0 2rem;
            font-size: 1.1rem;
        }
        .nav a {
            text-decoration: none;
            color: #5b4433;
            border-bottom: 2px solid transparent;
            padding-bottom: 0.2rem;
            transition: border-color 0.2s;
        }
        .nav a:hover {
            border-color: #b5a08c;
        }
        .footer {
            font-size: 0.85rem;
            color: #b5a08c;
            border-top: 1px solid #ece0d4;
            padding-top: 1.8rem;
            margin-top: 0.8rem;
            letter-spacing: 0.5px;
        }
        .footer span {
            display: block;
            margin-top: 0.3rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <a href="index-zh.html">中文版</a>
        </div>
        <div class="icon">🌱</div>
        <h1>The Garden of Quiet Stories</h1>
        <div class="sub">for little ears and gentle hearts</div>

        <div class="welcome">
            Welcome, little one — and you, too, grown-up who still remembers how to listen.<br />
            Here, stories grow slowly, like seeds in soft soil.
        </div>

        <div class="nav">
            <a href="index.html">Home</a>
            <a href="stories.html">Stories</a>
            <a href="about.html">About</a>
        </div>

        <div class="footer">
            🌙 <span>a quiet place for stories to rest</span>
        </div>
    </div>
</body>
</html>
